
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkTMS - Technology Management Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'poppins': ['Poppins', 'sans-serif'],
              'sans': ['Inter', 'sans-serif'],
            },
            colors: {
              'tms-blue': '#0D2B4F',
              'tms-cyan': '#00C2D1',
              'link-blue': '#3B82F6',
            },
            animation: {
              'fade-in-down': 'fade-in-down 1s ease-out forwards',
              'fade-in-up': 'fade-in-up 1s ease-out 0.5s forwards',
            },
            keyframes: {
              'fade-in-down': {
                '0%': {
                    opacity: '0',
                    transform: 'translateY(-20px)'
                },
                '100%': {
                    opacity: '1',
                    transform: 'translateY(0)'
                },
              },
              'fade-in-up': {
                '0%': {
                    opacity: '0',
                    transform: 'translateY(20px)'
                },
                '100%': {
                    opacity: '1',
                    transform: 'translateY(0)'
                },
              },
            }
          }
        }
      }
    </script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/"
  }
}
</script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
